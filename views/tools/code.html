<div class="view" id="code-view">
  <div id="code-skill-chip" style="margin-bottom:var(--space-md)"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:var(--space-md)">
    <div class="input-group" style="margin-bottom:0">
      <label class="input-label" data-i18n="code.modeLabel">Modo</label>
      <select class="input" id="code-mode">
        <option value="explain"  data-i18n="code.modes.explain">Explicar</option>
        <option value="generate" data-i18n="code.modes.generate">Generar</option>
        <option value="debug"    data-i18n="code.modes.debug">Depurar</option>
        <option value="refactor" data-i18n="code.modes.refactor">Refactorizar</option>
        <option value="document" data-i18n="code.modes.document">Documentar</option>
      </select>
    </div>
    <div class="input-group" style="margin-bottom:0">
      <label class="input-label" data-i18n="code.langLabel">Lenguaje</label>
      <select class="input" id="code-lang">
        <option value="JavaScript">JavaScript</option>
        <option value="TypeScript">TypeScript</option>
        <option value="Python">Python</option>
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="SQL">SQL</option>
        <option value="Bash">Bash</option>
        <option value="JSON">JSON</option>
        <option value="PHP">PHP</option>
        <option value="Java">Java</option>
      </select>
    </div>
  </div>

  <div class="input-group">
    <label class="input-label" id="code-input-label" data-i18n="code.inputLabel">Código</label>
    <textarea class="input textarea" id="code-input" rows="8"
              style="font-family:var(--font-mono);font-size:13px"
              data-i18n-placeholder="code.inputPlaceholder"></textarea>
  </div>

  <button class="btn btn-primary btn-full" id="code-run-btn">
    <span data-i18n="code.run">Ejecutar</span>
  </button>

  <div class="generating-bar" id="code-progress" style="margin-top:var(--space-md)">
    <div class="generating-bar-fill"></div>
  </div>

  <div id="code-result" style="display:none;margin-top:var(--space-md)">
    <label class="input-label">Resultado</label>
    <div class="output-box selectable" id="code-output"
         style="font-family:var(--font-mono);font-size:13px;white-space:pre-wrap"></div>
    <div class="output-actions" style="margin-top:var(--space-sm)">
      <button class="btn btn-secondary" id="code-copy-btn">
        <span data-i18n="code.copyCode">Copiar código</span>
      </button>
      <button class="btn btn-secondary" id="code-share-btn">
        <span data-i18n="common.share">Compartir</span>
      </button>
      <button class="btn btn-ghost" id="code-regen-btn">↺</button>
    </div>
  </div>
</div>
