<div class="view">

  <!-- API Status -->
  <div class="api-status" id="home-api-status">
    <div class="api-status-left">
      <div class="api-dot" id="home-api-dot"></div>
      <span class="api-text" id="home-api-text"></span>
    </div>
    <span class="api-action" id="home-api-action"
          data-i18n="common.settings">Ajustes</span>
  </div>

  <!-- Skills quick access -->
  <div class="list-item card-tap ripple" id="home-skills-btn"
       style="background:var(--bg-card);border-radius:var(--r-md);
              padding:var(--space-sm) var(--space-md);
              margin-bottom:var(--space-md)">
    <div class="list-icon"
         style="background:var(--purple-bg);color:var(--purple-light);
                font-size:18px">⚡</div>
    <div class="list-info">
      <div class="list-title" data-i18n="skills.title">Skills IA</div>
      <div class="list-subtitle" id="home-skills-count"></div>
    </div>
    <span class="list-chevron">›</span>
  </div>

  <!-- Tools grid -->
  <div class="section-label" data-i18n="home.tools">Herramientas</div>

  <div id="tools-grid"
       style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <!-- Renderizado por home.js -->
  </div>

</div>
