<div class="view">

  <!-- ── Barra de estado API ──────────────────────────────────────── -->
  <div class="api-status" id="home-api-status">
    <div class="api-status-left">
      <div class="api-dot warning" id="home-api-dot"></div>
      <span class="api-text" id="home-api-text" data-i18n="home.noApi">Configura tu API en Ajustes</span>

  </div>

  <!-- ── Cabecera de skills ────────────────────────────────────────── -->

    </div>
    <!-- Traductor -->

    <!-- Código IA -->

    <!-- Generador -->

    <!-- Repurpose -->

      <div class="tool-card-icon">♻️</div>
      <div class="tool-card-name" data-i18n="tools.repurpose">Repurpose</div>

    <!-- Resumir -->

      <div class="tool-card-skill" data-skill-chip-tool="brief"></div>

    <!-- Naming IA -->
    <div class="tool-card" data-route="naming">

    </div>
  </div>

  <!-- ── Script de inicio de vista ────────────────────────────────── -->
  <script>
  (function () {
    'use strict';

    function _updateApiStatus() {
      const dot    = document.getElementById('home-api-dot');
      const text   = document.getElementById('home-api-text');
      const action = document.getElementById('home-api-action');
      if (!dot || !text || !action) return;

      const hasKey = window.Providers && Providers.hasAnyKey();
      if (hasKey) {
        dot.className    = 'api-dot active';
        text.textContent = window.I18n ? I18n.t('home.apiReady') : 'API configurada';
        action.style.display = 'none';
      } else {
        dot.className    = 'api-dot warning';
        text.textContent = window.I18n ? I18n.t('home.noApi') : 'Configura tu API en Ajustes';
        action.style.display = '';
        action.textContent = window.I18n ? I18n.t('common.settings') : 'Ajustes';
      }
    }

    function _updateSkillsCount() {
      const badge = document.getElementById('skills-library-count');
      if (!badge || !window.Skills) return;
      const custom = Skills.getAll().filter(s => !s.isDefault);
      badge.textContent = custom.length > 0 ? String(custom.length) : '';
      badge.style.display = custom.length > 0 ? '' : 'none';
    }

    function _renderChips() {
      if (!window.SkillsUI) return;
      document.querySelectorAll('[data-skill-chip-tool]').forEach(el => {
        el.innerHTML = '';
        el.appendChild(SkillsUI.renderChip(el.dataset.skillChipTool));
      });
    }

    function _setupToolCards() {
      document.querySelectorAll('.tool-card[data-route]').forEach(card => {
        card.addEventListener('click', () => {
          const route = card.dataset.route;
          if (route && window.Router) {
            if (window.Utils) Utils.haptic('light');
            Router.navigate(route);
          }
        });
      });
    }

    function _setupSkillsLibraryBtn() {
      const btn = document.getElementById('btn-skills-library');
      if (!btn) return;
      btn.addEventListener('click', () => {
        if (window.SkillsUI) SkillsUI.openLibrary();
      });
    }

    function _setupApiActionBtn() {
      const action = document.getElementById('home-api-action');
      if (!action) return;
      action.addEventListener('click', () => {
        if (window.Router) Router.navigate('settings');
      });
    }

    // ── Escuchar eventos globales ──
    document.addEventListener('providers:changed', _updateApiStatus);
    document.addEventListener('skills:active-changed', _renderChips);
    document.addEventListener('i18n:changed', function () {
      _updateApiStatus();
      _updateSkillsCount();
    });

    // ── Arranque de la vista ──
    _updateApiStatus();
    _updateSkillsCount();
    _renderChips();
    _setupToolCards();
    _setupSkillsLibraryBtn();
    _setupApiActionBtn();
  })();
  </script>

</div>
